apiVersion: v1
kind: Service
metadata:
  name: users-api-service
  namespace: default
  labels:
    app: users-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  selector:
    app: users-api
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
